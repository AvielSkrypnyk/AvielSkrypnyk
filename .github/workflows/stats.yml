permissions:
  contents: write

name: Generate GitHub Stats

on:
  schedule:
    - cron: "0 */6 * * *" # runs every 6 hours
  workflow_dispatch: # allows manual run

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate Stats Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=AvielSkrypnyk&show_icons=true&bg_color=24273a&title_color=f5a97f&icon_color=f5a97f&text_color=cad3f5&hide_border=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Top Languages Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=AvielSkrypnyk&layout=compact&langs_count=12&bg_color=24273a&title_color=f5a97f&text_color=cad3f5&hide_border=true
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update stats" || exit 0
          git push